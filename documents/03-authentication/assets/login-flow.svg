<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1020" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>

    <!-- Animated dashes for data flow lines -->
    <style>
      @keyframes dashFlow { to { stroke-dashoffset: -20; } }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes tokenSpin { 0%,100% { r: 5; } 50% { r: 7; } }
      .flow-line { stroke-dasharray: 8,6; animation: dashFlow 0.8s linear infinite; }
      .flow-line-reverse { stroke-dasharray: 8,6; animation: dashFlow 0.8s linear infinite; animation-direction: reverse; }
      .fade-1 { opacity: 0; animation: fadeInUp 0.6s ease forwards 0.2s; }
      .fade-2 { opacity: 0; animation: fadeInUp 0.6s ease forwards 0.6s; }
      .fade-3 { opacity: 0; animation: fadeInUp 0.6s ease forwards 1.0s; }
      .fade-4 { opacity: 0; animation: fadeInUp 0.6s ease forwards 1.4s; }
      .fade-5 { opacity: 0; animation: fadeInUp 0.6s ease forwards 1.8s; }
      .fade-6 { opacity: 0; animation: fadeInUp 0.6s ease forwards 2.2s; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .token-dot { animation: tokenSpin 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="1020" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">The Complete Login Flow</text>
  <text x="450" y="60" text-anchor="middle" fill="#64748b" font-size="12">JWT Authentication Lifecycle — from login to logout</text>

  <!-- Column headers -->
  <!-- Browser -->
  <rect x="80" y="78" width="160" height="40" rx="10" fill="url(#userGrad)" filter="url(#shadow)"/>
  <text x="160" y="103" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">BROWSER</text>
  <!-- Server -->
  <rect x="660" y="78" width="160" height="40" rx="10" fill="url(#serverGrad)" filter="url(#shadow)"/>
  <text x="740" y="103" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">SERVER</text>

  <!-- Vertical timeline lines -->
  <line x1="160" y1="126" x2="160" y2="980" stroke="#334155" stroke-width="2" stroke-dasharray="4,6"/>
  <line x1="740" y1="126" x2="740" y2="980" stroke="#334155" stroke-width="2" stroke-dasharray="4,6"/>


  <!-- ===================== STAGE 1: USER LOGS IN ===================== -->
  <g class="fade-1">
    <!-- Stage label -->
    <rect x="30" y="140" width="24" height="24" rx="12" fill="#6366f1"/>
    <text x="42" y="157" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="62" y="157" fill="#c7d2fe" font-size="13" font-weight="700">USER LOGS IN</text>

    <!-- Browser: user types credentials -->
    <rect x="70" y="172" width="180" height="48" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="160" y="192" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">User enters</text>
    <text x="160" y="208" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">username + password</text>

    <!-- Arrow: browser -> server -->
    <line x1="250" y1="196" x2="640" y2="196" stroke="#6366f1" stroke-width="2" class="flow-line"/>
    <polygon points="638,186 658,196 638,206" fill="#6366f1" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="350" y="180" width="200" height="20" rx="4" fill="#1e293b"/>
    <text x="450" y="194" text-anchor="middle" fill="#818cf8" font-size="9" font-family="monospace">POST /api/v1/auth/login/</text>

    <!-- Server: verify + issue -->
    <rect x="650" y="172" width="180" height="68" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="740" y="192" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Verifies password</text>
    <text x="740" y="210" text-anchor="middle" fill="#e2e8f0" font-size="9">Issues tokens:</text>
    <text x="740" y="226" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="monospace">access (30m) + refresh (24h)</text>

    <!-- Arrow: server -> browser (tokens) -->
    <line x1="650" y1="230" x2="250" y2="230" stroke="#34d399" stroke-width="2" class="flow-line-reverse"/>
    <polygon points="252,225 242,230 252,235" fill="#34d399"/>

    <!-- Token indicators -->
    <circle cx="420" cy="230" r="5" fill="#a78bfa" class="token-dot"/>
    <circle cx="480" cy="230" r="5" fill="#fbbf24" class="token-dot" style="animation-delay:0.3s"/>

    <rect x="395" y="238" width="50" height="14" rx="3" fill="none"/>
    <text x="420" y="249" text-anchor="middle" fill="#a78bfa" font-size="7">access</text>
    <text x="480" y="249" text-anchor="middle" fill="#fbbf24" font-size="7">refresh</text>

    <!-- Browser stores -->
    <rect x="70" y="256" width="180" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="160" y="276" text-anchor="middle" fill="#94a3b8" font-size="9">Browser stores both tokens</text>
  </g>


  <!-- ===================== STAGE 2: EVERY API CALL ===================== -->
  <g class="fade-2">
    <rect x="30" y="306" width="24" height="24" rx="12" fill="#6366f1"/>
    <text x="42" y="323" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="62" y="323" fill="#c7d2fe" font-size="13" font-weight="700">EVERY API CALL</text>

    <!-- Browser sends token -->
    <rect x="70" y="338" width="180" height="36" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="160" y="352" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Sends request with</text>
    <text x="160" y="366" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="monospace">Authorization: Bearer &lt;token&gt;</text>

    <!-- Arrow -->
    <line x1="250" y1="356" x2="640" y2="356" stroke="#6366f1" stroke-width="2" class="flow-line"/>
    <polygon points="638,346 658,356 638,366" fill="#6366f1" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="450" cy="356" r="5" fill="#a78bfa" class="token-dot"/>

    <!-- Server verifies -->
    <rect x="650" y="338" width="180" height="56" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="740" y="355" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Verifies signature</text>
    <text x="740" y="370" text-anchor="middle" fill="#94a3b8" font-size="9">(no DB lookup needed)</text>
    <text x="740" y="385" text-anchor="middle" fill="#e2e8f0" font-size="9">Checks role/permissions</text>

    <!-- Arrow back: data -->
    <line x1="650" y1="386" x2="250" y2="386" stroke="#34d399" stroke-width="2" class="flow-line-reverse"/>
    <polygon points="252,381 242,386 252,391" fill="#34d399"/>
    <text x="450" y="400" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Returns data</text>

    <!-- Repeat indicator -->
    <rect x="370" y="408" width="160" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="450" y="422" text-anchor="middle" fill="#64748b" font-size="8" class="pulse">repeats for every request within 30 min</text>
  </g>


  <!-- ===================== STAGE 3: ACCESS TOKEN EXPIRES ===================== -->
  <g class="fade-3">
    <rect x="30" y="448" width="24" height="24" rx="12" fill="#d97706"/>
    <text x="42" y="465" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="62" y="465" fill="#fbbf24" font-size="13" font-weight="700">ACCESS TOKEN EXPIRES</text>
    <text x="312" y="465" fill="#64748b" font-size="11">(after 30 min)</text>

    <!-- Browser detects -->
    <rect x="70" y="480" width="180" height="36" rx="8" fill="#1e293b" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="160" y="494" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Detects expiry or 401</text>
    <text x="160" y="508" text-anchor="middle" fill="#94a3b8" font-size="9">Sends refresh token</text>

    <!-- Arrow -->
    <line x1="250" y1="498" x2="640" y2="498" stroke="#d97706" stroke-width="2" class="flow-line"/>
    <polygon points="638,488 658,498 638,508" fill="#d97706" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="330" y="482" width="240" height="20" rx="4" fill="#1e293b"/>
    <text x="450" y="496" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="monospace">POST /api/v1/auth/token/refresh/</text>
    <circle cx="450" cy="498" r="5" fill="#fbbf24" class="token-dot"/>

    <!-- Server: validate, blacklist, reissue -->
    <rect x="650" y="480" width="180" height="68" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="740" y="497" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Validates refresh token</text>
    <text x="740" y="513" text-anchor="middle" fill="#f87171" font-size="9">Blacklists old refresh</text>
    <text x="740" y="529" text-anchor="middle" fill="#a78bfa" font-size="9">Issues new access + refresh</text>

    <!-- Arrow back -->
    <line x1="650" y1="538" x2="250" y2="538" stroke="#34d399" stroke-width="2" class="flow-line-reverse"/>
    <polygon points="252,533 242,538 252,543" fill="#34d399"/>
    <circle cx="420" cy="538" r="5" fill="#a78bfa" class="token-dot"/>
    <circle cx="480" cy="538" r="5" fill="#fbbf24" class="token-dot" style="animation-delay:0.3s"/>

    <!-- Seamless note -->
    <rect x="350" y="548" width="200" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="450" y="562" text-anchor="middle" fill="#34d399" font-size="8" font-weight="600">User never notices — seamless</text>
  </g>


  <!-- ===================== STAGE 4: USER LOGS OUT ===================== -->
  <g class="fade-4">
    <rect x="30" y="590" width="24" height="24" rx="12" fill="#6366f1"/>
    <text x="42" y="607" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="62" y="607" fill="#c7d2fe" font-size="13" font-weight="700">USER LOGS OUT</text>

    <!-- Browser sends logout -->
    <rect x="70" y="622" width="180" height="36" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="160" y="636" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Sends refresh token</text>
    <text x="160" y="650" text-anchor="middle" fill="#94a3b8" font-size="9">Clears tokens from memory</text>

    <!-- Arrow -->
    <line x1="250" y1="640" x2="640" y2="640" stroke="#6366f1" stroke-width="2" class="flow-line"/>
    <polygon points="638,630 658,640 638,650" fill="#6366f1" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="345" y="624" width="210" height="20" rx="4" fill="#1e293b"/>
    <text x="450" y="638" text-anchor="middle" fill="#818cf8" font-size="9" font-family="monospace">POST /api/v1/auth/logout/</text>

    <!-- Server blacklists -->
    <rect x="650" y="622" width="180" height="36" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="740" y="636" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Blacklists refresh token</text>
    <text x="740" y="650" text-anchor="middle" fill="#94a3b8" font-size="9">Session killed server-side</text>

    <!-- Next request -->
    <rect x="340" y="668" width="220" height="22" rx="6" fill="#1e293b" stroke="#dc2626" stroke-width="1"/>
    <text x="450" y="683" text-anchor="middle" fill="#f87171" font-size="9">Next request -> 401 Unauthorized</text>
  </g>


  <!-- ===================== STAGE 5: REFRESH TOKEN EXPIRES ===================== -->
  <g class="fade-5">
    <rect x="30" y="714" width="24" height="24" rx="12" fill="#d97706"/>
    <text x="42" y="731" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="62" y="731" fill="#fbbf24" font-size="13" font-weight="700">REFRESH TOKEN EXPIRES</text>
    <text x="330" y="731" fill="#64748b" font-size="11">(after 24 hr of inactivity)</text>

    <!-- Browser tries refresh -->
    <rect x="70" y="748" width="180" height="30" rx="8" fill="#1e293b" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="160" y="768" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Tries to refresh...</text>

    <!-- Arrow -->
    <line x1="250" y1="763" x2="640" y2="763" stroke="#d97706" stroke-width="2" class="flow-line"/>
    <polygon points="638,753 658,763 638,773" fill="#d97706" stroke="#fbbf24" stroke-width="1.5"/>

    <!-- Server rejects -->
    <rect x="650" y="748" width="180" height="30" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="740" y="768" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">REJECTED</text>

    <!-- Arrow back -->
    <line x1="650" y1="773" x2="250" y2="793" stroke="#dc2626" stroke-width="2" class="flow-line-reverse"/>
    <polygon points="252,788 242,793 252,798" fill="#dc2626"/>

    <!-- Must re-login -->
    <rect x="340" y="798" width="220" height="22" rx="6" fill="#1e293b" stroke="#dc2626" stroke-width="1"/>
    <text x="450" y="813" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">User must log in again (back to Step 1)</text>
  </g>


  <!-- ===================== STAGE 6: ACCOUNT SUSPENDED ===================== -->
  <g class="fade-6">
    <rect x="30" y="842" width="24" height="24" rx="12" fill="#dc2626"/>
    <text x="42" y="859" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6</text>
    <text x="62" y="859" fill="#f87171" font-size="13" font-weight="700">ACCOUNT SUSPENDED</text>

    <!-- Admin action on server -->
    <rect x="650" y="874" width="180" height="36" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="740" y="888" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Admin sets</text>
    <text x="740" y="903" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="monospace">is_active = False</text>

    <!-- Browser sends normal request -->
    <rect x="70" y="874" width="180" height="30" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="160" y="894" text-anchor="middle" fill="#94a3b8" font-size="9">Next API call (valid token)</text>

    <!-- Arrow -->
    <line x1="250" y1="889" x2="640" y2="889" stroke="#6366f1" stroke-width="2" class="flow-line"/>
    <polygon points="638,879 658,889 638,899" fill="#6366f1" stroke="#818cf8" stroke-width="1.5"/>

    <!-- Server checks is_active -->
    <rect x="650" y="918" width="180" height="36" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="740" y="933" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Checks is_active -> False</text>
    <text x="740" y="947" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">REJECTS TOKEN</text>

    <!-- Arrow back -->
    <line x1="650" y1="940" x2="250" y2="940" stroke="#dc2626" stroke-width="2" class="flow-line-reverse"/>
    <polygon points="252,935 242,940 252,945" fill="#dc2626"/>

    <!-- Locked out -->
    <rect x="295" y="956" width="310" height="26" rx="8" fill="#450a0a" stroke="#dc2626" stroke-width="1.5"/>
    <text x="450" y="974" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">Locked out immediately — even with valid tokens</text>
  </g>


  <!-- ===================== FOOTER ===================== -->
  <text x="450" y="1008" text-anchor="middle" fill="#475569" font-size="9">Layer 3 — JWT Authentication Lifecycle</text>
</svg>